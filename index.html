<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palabras Sin Sentido</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            padding: 50px;
        }
        #lista-palabras {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 100px;
        }
        .palabra {
            background: #ff6b6b;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
        }
        input, button {
            padding: 10px;
            font-size: 16px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4ecdc4;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45b7af;
        }
    </style>
</head>
<body>

    <h1>Muro de Palabras Sin Sentido</h1>
    
    <div id="lista-palabras">
        <p id="cargando">Cargando palabras...</p>
    </div>

    <h2>¿Quieres poner la tuya?</h2>
    <form id="formulario">
        <input type="text" id="nueva-palabra" placeholder="Escribe algo raro aquí..." required autocomplete="off">
        <button type="submit" id="boton-enviar">Guardar palabra</button>
    </form>

    <script>
        // PEGA TU URL DE GOOGLE APPS SCRIPT AQUÍ:
        const SCRIPT_URL = 'AQUI_PEGA_TU_URL_DE_GOOGLE_APPS_SCRIPT';
        
        const contenedorPalabras = document.getElementById('lista-palabras');
        const formulario = document.getElementById('formulario');
        const inputPalabra = document.getElementById('nueva-palabra');
        const botonEnviar = document.getElementById('boton-enviar');

        // Función para leer las palabras del Excel al cargar la página
        async function cargarPalabras() {
            try {
                const response = await fetch(SCRIPT_URL);
                const palabras = await response.json();
                
                contenedorPalabras.innerHTML = ''; // Limpiar el "cargando"
                
                if (palabras.length === 0) {
                    contenedorPalabras.innerHTML = '<p>Aún no hay palabras. ¡Sé el primero!</p>';
                    return;
                }

                palabras.forEach(palabra => {
                    const span = document.createElement('span');
                    span.className = 'palabra';
                    span.textContent = palabra;
                    contenedorPalabras.appendChild(span);
                });
            } catch (error) {
                contenedorPalabras.innerHTML = '<p>Error al cargar las palabras.</p>';
                console.error('Error:', error);
            }
        }

        // Función para guardar una nueva palabra en el Excel
        formulario.addEventListener('submit', async (e) => {
            e.preventDefault(); // Evitar que la página se recargue
            const palabraText = inputPalabra.value.trim();
            
            if(!palabraText) return;

            // Cambiar el botón para mostrar que está pensando
            botonEnviar.textContent = "Guardando...";
            botonEnviar.disabled = true;

            const formData = new FormData();
            formData.append('palabra', palabraText);

            try {
                // Enviamos los datos al Google Apps Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData
                });

                // Limpiamos el input y recargamos la lista visualmente
                inputPalabra.value = '';
                await cargarPalabras();
            } catch (error) {
                alert("Hubo un error al guardar la palabra.");
            } finally {
                botonEnviar.textContent = "Guardar palabra";
                botonEnviar.disabled = false;
            }
        });

        // Ejecutar la carga de palabras cuando la página inicie
        cargarPalabras();
    </script>
</body>
</html>
